<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://api.qrserver.com https://*.supabase.co; connect-src 'self' https://*.supabase.co; font-src 'self' data:; media-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; upgrade-insecure-requests">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>ITAM - Account Settings</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar"></aside>

    <main class="main">
      <header class="topbar" id="accountSettingsTopbar" hidden>
        <button class="sidebar-toggle-btn" id="sidebarToggleBtn" type="button" aria-label="Open navigation" aria-expanded="false">
          <svg width="18" height="14" viewBox="0 0 18 14" fill="none" aria-hidden="true"><rect width="18" height="2" rx="1" fill="currentColor"/><rect y="6" width="18" height="2" rx="1" fill="currentColor"/><rect y="12" width="18" height="2" rx="1" fill="currentColor"/></svg>
        </button>
        <div>
          <h1>Account Settings</h1>
          <div class="subtext">Customize site branding and account-level display settings.</div>
        </div>
        <div class="controls">
          <span class="connection-badge is-reconnecting" id="connectionBadge" aria-live="polite" title="Database status: reconnecting">Database</span>
          <button class="btn" id="signOutBtn" type="button">Log Out</button>
        </div>
      </header>

      <section class="panel" id="accountSettingsLoadingPanel">
        <div class="panel-body">
          <div class="loading-spinner" aria-hidden="true"></div>
          <h2>Checking Access</h2>
          <p class="muted">Please wait while we verify your session and role.</p>
        </div>
      </section>

      <section class="panel" id="accountSettingsMainSection" hidden>
        <div class="panel-body">
          <h2>Branding</h2>
          <p class="muted">These values update the left sidebar title across this browser profile.</p>
          <div class="grid cols-2">
            <div>
              <label for="settingsSiteName">Site Name</label>
              <input id="settingsSiteName" placeholder="IT Asset Management">
            </div>
            <div>
              <label for="settingsCompanyName">Company Name</label>
              <input id="settingsCompanyName" placeholder="SMSD Tech Team">
            </div>
          </div>
          <div class="row form-actions">
            <button class="btn primary" id="saveBrandingBtn" type="button">Save</button>
            <button class="btn" id="resetBrandingBtn" type="button">Reset to Defaults</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <script src="./config.js"></script>
  <script src="./nav.js"></script>
  <script type="module" src="./js/account-settings.js"></script>
  <button class="theme-toggle-fab" id="themeBtn" type="button" aria-label="Toggle theme">
    <span class="theme-toggle-glyph" aria-hidden="true"></span>
  </button>
</body>
</html>
