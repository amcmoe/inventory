<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://api.qrserver.com https://*.supabase.co; connect-src 'self' https://*.supabase.co; font-src 'self' data:; media-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; upgrade-insecure-requests">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <title>ITAM - User Device History Report</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar"></aside>

    <main class="main">
      <header class="topbar" id="userReportsTopbar" hidden
        data-title="User Device History Report"
        data-subtitle="Generate assignment and damage history by assignee."></header>

      <section class="panel" id="userReportsLoadingPanel">
        <div class="panel-body">
          <div class="loading-spinner" aria-hidden="true"></div>
          <h2>Checking Access</h2>
          <p class="muted">Please wait while we verify your session.</p>
        </div>
      </section>

      <section class="panel" id="userReportsMainSection" hidden>
        <div class="panel-header">
          <strong>User Device History Report</strong>
        </div>
        <div class="panel-body">
          <div class="user-report-search-field">
            <input id="userReportAssigneeFilter" placeholder="Search by name, email, or employee ID…">
            <div id="userReportAssigneeSuggestions" class="suggestions report-assignee-suggestions" hidden></div>
          </div>
          <div class="report-builder-actions">
            <button class="btn primary" id="generateUserReportBtn" type="button">Generate</button>
            <button class="btn ghost" id="resetUserReportBtn" type="button" hidden>Reset</button>
          </div>
        </div>

        <div id="userReportResultsSection" hidden>
          <div class="user-report-results-header" id="userReportForRow">
            <strong id="userReportForText">User report for -</strong>
            <div class="export-popover" id="userReportExportPopoverRoot">
              <button class="btn primary" id="userReportExportAsBtn" type="button" aria-haspopup="true" aria-expanded="false">Export As</button>
              <div class="export-popover-menu" id="userReportExportPopoverMenu" hidden>
                <button class="btn ghost export-option" id="userReportExportCsvBtn" type="button">CSV (Excel/Sheets)</button>
                <button class="btn ghost export-option" id="userReportExportXlsxBtn" type="button">XLSX (Workbook)</button>
                <button class="btn ghost export-option" id="userReportExportHtmlBtn" type="button">HTML (Web Report)</button>
                <button class="btn ghost export-option" id="userReportExportPdfBtn" type="button">PDF (Printable)</button>
              </div>
            </div>
          </div>

          <div class="user-report-section-label">Assignment history</div>
          <div class="table-wrap">
            <table aria-label="User asset history">
              <thead>
                <tr>
                  <th>Serial</th>
                  <th>Model</th>
                  <th>Date Assigned</th>
                  <th>Status</th>
                  <th>Current Assignee</th>
                  <th>Building / Room</th>
                </tr>
              </thead>
              <tbody id="userReportAssetsBody"></tbody>
            </table>
          </div>

          <div class="user-report-section-label">Damage history</div>
          <div class="table-wrap">
            <table aria-label="User damage history">
              <thead>
                <tr>
                  <th>Serial</th>
                  <th>Date</th>
                  <th>Summary</th>
                  <th>Reported By</th>
                  <th>Photos</th>
                </tr>
              </thead>
              <tbody id="userReportDamagesBody"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="./config.js"></script>
  <script src="./shell.js"></script>
  <script src="./nav.js"></script>
  <script type="module" src="./js/user-reports.js"></script>
</body>
</html>
