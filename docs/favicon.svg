<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-hidden="true">
  <defs>
    <linearGradient id="bg" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#60a5fa"></stop>
      <stop offset="1" stop-color="#34d399"></stop>
    </linearGradient>
  </defs>

  <!-- Background (optional) -->
  <rect x="6" y="6" width="52" height="52" rx="14" fill="url(#bg)"></rect>

  <!-- QR tile -->
  <rect x="22" y="22" width="20" height="20" rx="3" fill="#fff"></rect>

  <!-- QR modules (10x10 grid, module=2px). All non-overlapping. -->
  <!-- Tile origin: (22,22). Module positions = origin + (col*2, row*2) -->
  <g fill="#111827">
    <!-- Finder patterns (3x3 modules each) -->
    <!-- TL finder: cols 1-3, rows 1-3 -->
    <rect x="24" y="24" width="6" height="6"></rect>
    <!-- TR finder: cols 6-8, rows 1-3 -->
    <rect x="34" y="24" width="6" height="6"></rect>
    <!-- BL finder: cols 1-3, rows 6-8 -->
    <rect x="24" y="34" width="6" height="6"></rect>

    <!-- Extra modules (single-module squares, size 2x2) -->
    <rect x="32" y="26" width="2" height="2"></rect>
    <rect x="30" y="30" width="2" height="2"></rect>
    <rect x="36" y="30" width="2" height="2"></rect>
    <rect x="32" y="34" width="2" height="2"></rect>
    <rect x="38" y="36" width="2" height="2"></rect>
    <rect x="28" y="38" width="2" height="2"></rect>
  </g>

  <!-- White centers of finders (1 module each), also non-overlapping -->
  <g fill="#fff">
    <rect x="26" y="26" width="2" height="2"></rect>
    <rect x="36" y="26" width="2" height="2"></rect>
    <rect x="26" y="36" width="2" height="2"></rect>
  </g>

  <!-- Magnifying glass -->
  <circle cx="32" cy="32" r="14" fill="none" stroke="#1e3a8a" stroke-width="4"></circle>
  <line x1="42" y1="42" x2="52" y2="52" stroke="#1e3a8a" stroke-width="4" stroke-linecap="round"></line>
</svg>