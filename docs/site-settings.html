<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="./favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="./favicon.png">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://api.qrserver.com https://*.supabase.co; connect-src 'self' https://*.supabase.co; font-src 'self' data:; media-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; upgrade-insecure-requests">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>ITAM - Site Settings</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar"></aside>

    <main class="main">
      <header class="topbar" id="siteSettingsTopbar" hidden
        data-title="Site Settings"
        data-subtitle="Customize branding shown in the sidebar."></header>

      <section class="panel" id="siteSettingsLoadingPanel">
        <div class="panel-body">
          <div class="loading-spinner" aria-hidden="true"></div>
          <h2>Checking Access</h2>
          <p class="muted">Please wait while we verify your session and role.</p>
        </div>
      </section>

      <section class="panel" id="siteSettingsMainSection" hidden>
        <div class="panel-body">
          <h2>Branding</h2>
          <p class="muted">These values update the left sidebar title across this browser profile.</p>
          <div class="grid cols-2">
            <div class="float-field">
              <input id="settingsSiteName" placeholder=" ">
              <label for="settingsSiteName">Site Name</label>
            </div>
            <div class="float-field">
              <input id="settingsCompanyName" placeholder=" ">
              <label for="settingsCompanyName">Company Name</label>
            </div>
          </div>
          <div class="row form-actions">
            <button class="btn primary" id="saveBrandingBtn" type="button">Save</button>
            <button class="btn" id="resetBrandingBtn" type="button">Reset to Defaults</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="./config.js"></script>
  <script src="./shell.js"></script>
  <script src="./nav.js"></script>
  <script type="module" src="./js/site-settings.js"></script>
</body>
</html>
