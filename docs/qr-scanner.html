<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://api.qrserver.com https://*.supabase.co; connect-src 'self' https://*.supabase.co; font-src 'self' data:; media-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; upgrade-insecure-requests">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <title>Inventory - QR Scanner</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo itam-logo" aria-hidden="true">
          <span class="itam-row itam-row-top"><span class="itam-i" aria-hidden="true"></span><span>T</span></span>
          <span class="itam-row itam-row-bottom"><span>A</span><span>M</span></span>
        </div>
        <div class="title">
          <strong>IT Asset Management</strong>
          <span>SMSD Tech Team</span>
        </div>
      </div>
      <nav class="nav" id="scannerNav" hidden>
        <a href="./index.html"><span>Search</span></a>
        <a href="./admin.html" data-role-min="admin"><span>Admin</span></a>
        <a href="./reports.html"><span>Reports</span></a>
        <a class="active" href="./qr-scanner.html"><span>QR Scanner</span></a>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar" id="scannerTopbar" hidden>
        <button class="sidebar-toggle-btn" id="sidebarToggleBtn" type="button" aria-label="Open navigation" aria-expanded="false">
          <svg width="18" height="14" viewBox="0 0 18 14" fill="none" aria-hidden="true"><rect width="18" height="2" rx="1" fill="currentColor"/><rect y="6" width="18" height="2" rx="1" fill="currentColor"/><rect y="12" width="18" height="2" rx="1" fill="currentColor"/></svg>
        </button>
        <div>
          <h1>QR Scanner</h1>
          <div class="subtext">Scan an inventory QR code to open matching asset.</div>
        </div>
      </header>

      <section class="panel" id="scannerLoadingPanel">
        <div class="panel-body">
          <div class="loading-spinner" aria-hidden="true"></div>
          <h2>Checking Access</h2>
          <p class="muted">Please wait while we verify your session.</p>
        </div>
      </section>

      <section class="panel" id="scannerMainSection" hidden>
        <div class="panel-body">
          <div class="controls">
            <button class="btn primary" id="startScannerBtn" type="button">Start Camera</button>
            <button class="btn" id="stopScannerBtn" type="button" disabled>Stop</button>
          </div>

          <div class="scanner-stage">
            <video id="scannerVideo" autoplay playsinline muted></video>
            <canvas id="scannerCanvas" hidden></canvas>
            <div class="scanner-overlay"></div>
          </div>

          <div class="grid">
            <div>
              <label for="manualTag">Manual Serial / Tag</label>
              <div class="row">
                <input id="manualTag" placeholder="PW063XXX">
                <button class="btn" id="manualLookupBtn" type="button">Find</button>
              </div>
            </div>
            <div class="detail">
              <div class="k">Last Scan</div>
              <div class="v" id="lastScanValue">No scan yet.</div>
            </div>
          </div>
        </div>
      </section>

      <section class="panel" id="scannerResultSection" hidden>
        <div class="panel-body" id="scannerResultBody"></div>
      </section>
    </main>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script src="./config.js"></script>
  <script src="./nav.js"></script>
  <script type="module" src="./js/qr-scanner.js"></script>
</body>
</html>
