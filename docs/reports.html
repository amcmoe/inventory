<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://api.qrserver.com https://*.supabase.co; connect-src 'self' https://*.supabase.co; font-src 'self' data:; media-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; upgrade-insecure-requests">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <link rel="icon" href="./favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="./favicon.png">
  <title>ITAM - Reports</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar"></aside>

    <main class="main">
      <header class="topbar" id="reportsTopbar" hidden
        data-title="Reports"
        data-subtitle="Build and export asset reports (CSV, XLSX, HTML, PDF)."></header>

      <section class="panel" id="reportsLoadingPanel">
        <div class="panel-body">
          <div class="loading-spinner" aria-hidden="true"></div>
          <h2>Checking Access</h2>
          <p class="muted">Please wait while we verify your session.</p>
        </div>
      </section>

      <section class="reports-sections" id="reportsMainSection" hidden>
        <section class="panel reports-builder-panel" aria-label="Report builder">
          <div class="panel-header">
            <strong>Report Builder</strong>
            <button class="btn ghost report-builder-toggle" id="reportBuilderToggle" type="button" aria-label="Collapse filters" aria-expanded="true" hidden>
              <svg class="report-builder-toggle-chevron" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M3 5.5L8 10.5L13 5.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Filters
            </button>
          </div>

          <div class="panel-body reports-builder-body" id="reportBuilderBody">
            <!-- Prebuilt quick reports strip -->
            <div class="report-prebuilt-strip" id="reportPrebuiltStrip">
              <span class="report-prebuilt-label">Quick Reports</span>
              <button class="btn ghost report-prebuilt-mobile-toggle" id="reportPrebuiltMobileToggle" type="button" aria-expanded="false">
                Quick Reports
                <svg class="report-prebuilt-chevron" width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M3 5.5L8 10.5L13 5.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>
              <div class="report-prebuilt-cards" id="reportPrebuiltCards"></div>
            </div>

            <div class="report-builder-controls">
              <div class="report-custom-banner" id="reportCustomBanner" hidden></div>

              <!-- Grouped filters -->
              <div class="report-filter-groups">
                <div class="report-filter-group">
                  <span class="report-filter-group-label">Asset</span>
                  <div class="report-filter-grid">
                    <div class="field small select-field">
                      <select id="reportStatusFilter">
                        <option value="">All status</option>
                        <option value="available">Available</option>
                        <option value="checked_out">Assigned</option>
                        <option value="repair">Repair</option>
                        <option value="retired">Retired</option>
                      </select>
                    </div>
                    <div class="field small select-field">
                      <select id="reportTypeFilter">
                        <option value="">All types</option>
                      </select>
                    </div>
                    <div class="field select-field">
                      <select id="reportManufacturerFilter">
                        <option value="">All manufacturers</option>
                      </select>
                    </div>
                    <div class="field select-field">
                      <select id="reportModelFilter">
                        <option value="">All models</option>
                      </select>
                    </div>
                    <div class="field select-field">
                      <select id="reportObsoleteFilter">
                        <option value="">All lifecycle</option>
                        <option value="false">Active only</option>
                        <option value="true">Obsolete only</option>
                      </select>
                    </div>
                    <div class="field select-field report-ownership-field">
                      <select id="reportOwnershipFilter">
                        <option value="">Owned/leased</option>
                        <option value="owned">Owned</option>
                        <option value="leased">Leased</option>
                      </select>
                    </div>
                  </div>
                </div>
                <div class="report-filter-group">
                  <span class="report-filter-group-label">Location</span>
                  <div class="report-filter-grid">
                    <div class="field select-field">
                      <select id="reportBuildingFilter">
                        <option value="">All buildings</option>
                      </select>
                    </div>
                    <div class="field select-field">
                      <select id="reportRoomFilter">
                        <option value="">All rooms</option>
                      </select>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Active filter chips (shown after generate) -->
              <div class="report-filter-chips" id="reportFilterChips" hidden></div>
            </div>

            <!-- Actions row -->
            <div class="report-builder-actions">
              <button class="btn primary" id="generateReportBtn" type="button">Generate</button>
              <button class="btn ghost" id="resetReportBtn" type="button" hidden>Reset</button>
            </div>
          </div>

          <div id="reportResultsSection" hidden>
            <!-- Summary bar -->
            <div class="report-summary-bar" id="reportSummaryBar" hidden></div>

            <!-- Results toolbar: Columns + Export -->
            <div class="report-columns-toolbar" id="reportColumnsToolbar" hidden>
              <div class="report-columns-toggle-wrap">
                <button class="btn ghost report-columns-btn" id="reportColumnsBtn" type="button">
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><rect x="1" y="1" width="4" height="12" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="1" width="4" height="12" rx="1" stroke="currentColor" stroke-width="1.5"/></svg>
                  Columns
                </button>
                <div class="report-columns-dropdown" id="reportColumnsDropdown" hidden></div>
              </div>
              <div class="export-popover" id="exportPopoverRoot">
                <button class="btn primary" id="exportAsBtn" type="button" aria-haspopup="true" aria-expanded="false">Export As</button>
                <div class="export-popover-menu" id="exportPopoverMenu" hidden>
                  <button class="btn ghost export-option" id="exportCsvBtn" type="button">CSV (Excel/Sheets)</button>
                  <button class="btn ghost export-option" id="exportXlsxBtn" type="button">XLSX (Workbook)</button>
                  <button class="btn ghost export-option" id="exportHtmlBtn" type="button">HTML (Web Report)</button>
                  <button class="btn ghost export-option" id="exportPdfBtn" type="button">PDF (Printable)</button>
                </div>
              </div>
            </div>

            <div class="table-wrap">
              <table aria-label="Report data">
                <thead>
                  <tr id="reportHeadRow">
                    <th>Manufacturer</th>
                    <th>Serial</th>
                    <th>Type</th>
                    <th>Model</th>
                    <th>Assigned To</th>
                    <th>Status</th>
                    <th>Building / Room</th>
                  </tr>
                </thead>
                <tbody id="reportsBody"></tbody>
              </table>
            </div>
            <div class="panel-body report-pager-row">
              <div class="report-pager-left" id="reportPagerLeft">
                <span id="reportResultInfo" class="muted">Results: 0</span>
              </div>
              <div class="report-pager" id="reportPagerControls">
                <div class="report-page-block">
                  <span id="reportCurrentPage" class="report-page-number">1</span>
                  <span id="reportPageInfo" class="muted">of 1 pages</span>
                </div>
                <button class="btn icon report-nav-btn" id="reportPrevBtn" type="button" aria-label="Previous page">&#8249;</button>
                <button class="btn icon report-nav-btn" id="reportNextBtn" type="button" aria-label="Next page">&#8250;</button>
                <div class="report-items-block">
                  <div class="field small select-field report-page-size-field">
                    <select id="reportPageSize">
                      <option value="20">20</option>
                      <option value="50">50</option>
                      <option value="100">100</option>
                    </select>
                  </div>
                  <span class="muted">items per page</span>
                </div>
              </div>
            </div>
          </div>
        </section>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="./config.js"></script>
  <script src="./shell.js"></script>
  <script src="./nav.js"></script>
  <script type="module" src="./js/reports.js"></script>
</body>
</html>
